services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mistake-notebook
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MISTAKE_DB_PATH: /app/data/mistakes.db
      MISTAKE_BACKUP_DIR: /app/backups
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./src/uploads:/app/src/uploads
